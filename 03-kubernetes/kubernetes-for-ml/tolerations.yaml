# Pod must have this toleration to land on tainted GPU nodes
spec:
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "gpu-training"
      effect: "NoSchedule"

  # Combine with node affinity to both require AND be allowed on GPU nodes
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: workload-type
                operator: In
                values: ["gpu-training"]
