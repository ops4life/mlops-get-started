# gpu-pod.yaml — Pod spec snippet: request a GPU for CUDA training workloads
#
# HOW GPU SCHEDULING WORKS IN KUBERNETES:
# The NVIDIA device plugin (nvidia-plugin.sh) advertises GPUs as the extended
# resource "nvidia.com/gpu" on each node. Pods must explicitly request this
# resource — the scheduler then places the pod on a node with a free GPU and
# grants the container exclusive access to it.
#
# CRITICAL RULE — requests MUST equal limits for nvidia.com/gpu:
# Unlike CPU and memory (which are divisible), a GPU is allocated as a whole
# unit. The Kubernetes scheduler does not support fractional GPU requests.
# If requests != limits, the scheduler rejects the pod with an admission error.
# Always set them to the same integer value.
#
# MULTI-GPU TRAINING:
# To use multiple GPUs on one node, set both requests and limits to the count
# you need (e.g., 4 for 4-GPU data-parallel training with PyTorch DDP).
# The device plugin will assign 4 specific GPU indices to the container.

spec:
  containers:
    - name: training
      # Use NVIDIA's NGC (NVIDIA GPU Cloud) base images for CUDA + PyTorch.
      # The tag format is: <framework-version>-py<python>
      # Always pin to a specific tag — "latest" changes frequently and can
      # break reproducibility between runs.
      image: nvcr.io/nvidia/pytorch:24.01-py3

      resources:
        requests:
          nvidia.com/gpu: 1   # Request 1 GPU — must match limits (see above)
          memory: "32Gi"      # GPU training processes often pre-load the full
                              # dataset into CPU RAM for fast data loading.
                              # Size this to dataset size + model overhead.
          cpu: "8"            # Data loading (DataLoader workers) is CPU-bound.
                              # Rule of thumb: 2× num_workers in your DataLoader.
        limits:
          nvidia.com/gpu: 1   # Must equal requests — no fractional GPU allocation
          memory: "32Gi"      # Set limits == requests for memory to prevent the
                              # container from being OOM-killed mid-training.
          cpu: "16"           # Allow bursting to 16 cores during data prefetch.

      env:
        # CUDA_VISIBLE_DEVICES controls which physical GPU indices are visible
        # inside the container. The NVIDIA device plugin sets this automatically
        # based on which GPU was allocated, so you rarely need to set it manually.
        # Explicit "0" is shown here for clarity — the plugin may assign GPU index
        # 3 or 5 on the node, but inside the container it always appears as "0".
        - name: CUDA_VISIBLE_DEVICES
          value: "0"

      # Always pass --device=cuda to your training script to confirm GPU usage.
      # If CUDA isn't available the script should fail fast rather than silently
      # falling back to CPU (which would waste the scheduled GPU resource).
      command: ["python", "train_gpu.py", "--device=cuda"]
